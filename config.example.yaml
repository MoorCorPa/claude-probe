# Claude Probe Configuration
server:
  port: 3210
  interval_min: 60        # default probe interval (minutes)
  max_history: 30         # default max results to keep per target
  max_retries: 3          # default retry count on failure

targets:
  - name: "Example Proxy"
    base_url: "https://api.example.com"
    api_key: "sk-xxx"
    model: "claude-opus-4-7"
    # interval_min: 10    # override per-target interval
    # max_history: 50     # override per-target history limit
    # max_retries: 5      # override per-target retry count

# Email alert when all probe checks fail (non-network failure)
actions:
  email:
    from: "probe@example.com"
    to: "admin@example.com"
    smtp:
      host: "smtp.example.com"
      port: 465
      secure: true
      user: "probe@example.com"
      pass: "your-smtp-password"
